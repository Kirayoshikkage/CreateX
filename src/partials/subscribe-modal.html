<div class="modal subscribe-modal">
  <div class="modal__body subscribe-modal__body">
    <div class="modal__content subscribe-modal__content">
      <h2 class="text-reset modal__subtitle">A quick way to discuss details</h2>
      <form class="subscribe-form form" action="#">
        <label class="form__label">
          <span class="form__text">Name*</span>
          <input
            class="input-reset form__input form__input_name"
            name="name"
            type="text"
            placeholder="Your name"
          />
          <span class="validate-error-message"></span>
        </label>
        <label class="form__label">
          <span class="form__text">Email*</span>
          <input
            class="input-reset form__input form__input_email"
            name="email"
            type="text"
            placeholder="Your working email"
          />
          <span class="validate-error-message"></span>
        </label>
        <button class="btn-reset button form__button" type="submit">
          Send
        </button>
      </form>
      <button class="btn-reset modal__close" type="button">
        <svg class="modal__icon">
          <use xlink:href="img/sprite.svg#close"></use>
        </svg>
      </button>
    </div>
  </div>
</div>
