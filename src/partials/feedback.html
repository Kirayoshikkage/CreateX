<section class="feedback">
  <div class="container">
    <h2 class="visually-hidden">Feedback</h2>
    <div class="feedback__content">
      <h3 class="text-reset feedback__subtitle">
        A quick way to discuss details
      </h3>
      <form class="feedback-form form" action="#">
        <label class="form__label">
          <span class="form__text">Name*</span>
          <input
            class="input-reset form__input form__input_name"
            name="name"
            type="text"
            placeholder="Your name"
          />
          <span class="validate-error-message"></span>
        </label>
        <label class="form__label">
          <span class="form__text">Phone*</span>
          <input
            class="input-reset form__input form__input_phone"
            name="phone"
            type="tel"
            placeholder="Your phone"
          />
          <span class="validate-error-message"></span>
        </label>
        <label class="form__label">
          <span class="form__text">Email*</span>
          <input
            class="input-reset form__input form__input_email"
            name="email"
            type="text"
            placeholder="Your working email"
          />
          <span class="validate-error-message"></span>
        </label>
        <label class="form__label form__label_textarea">
          <span class="form__text">Message*</span>
          <textarea
            class="input-reset form__input form__input_textarea form__input_message"
            name="message"
            cols="30"
            rows="2"
            placeholder="Your message"
          ></textarea>
          <span class="validate-error-message"></span>
        </label>
        <label class="custom-checkbox" tabindex="0">
          <input class="custom-checkbox__field" type="checkbox" />
          <span class="custom-checkbox__content">
            I agree to receive communications from Createx Construction Bureau.
          </span>
          <span class="validate-error-message"></span>
        </label>
        <button class="btn-reset button form__button" type="submit">
          Send request
        </button>
      </form>
    </div>
  </div>
</section>
